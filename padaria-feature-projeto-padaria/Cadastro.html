<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login-contato.css">
    <title>Padaria Belas Artes | Cadastro</title>
</head>
<body>
    <section class="area-cadastro">
        <div class="area-form-cadastro">
            <p>Cadastro de Conta</p>
            <div>
                <img src="image\belas-artes-logo.webp" alt="logo belas artes">
            </div>

        <form method="post">
            <input type="text" placeholder="Nome" required>
            <input type="email" name="email" id="email" placeholder="E-mail" required>
            <input type="tel" name="phone" id="phone" placeholder="Telefone" required>
            <input type="text" name="endereco" id="endereco" placeholder="Endereço" required>
            <input type="text" name="complemento" id="complemento" placeholder="Complemento" required>
            <input type="password" name="senha" id="senha" placeholder="Digite sua senha" required>
            <input type="password" name="senha" id="senha" placeholder="Confirmar senha" required>
            <input type="submit" value="CADASTRAR">
        </form>
    </div>
    </section>
</body>
</html>
