<body>
   <h1>Formulario de Inscriçao</h1>
   <h2>preencha seus dados</h2>

   <form>

        <label for="nome">Nome:</label>
        <input id="nome" type="text"  name="nome" placeholder="Digite seu Nome" style="margin-bottom: 20px;"  required><br>

        <label for="email">E-mail:</label>
        <input id="" type="email" name="email" placeholder="Digite seu email" style="margin-bottom: 20px;" required><br>

        <label for="endereço">Endereço</label>
        <input id="endereço" type="text" name="endereço" placeholder="Digite seu email" style="margin-bottom: 20px;" required><br>

        <label for="cidade">Cidade</label>
        <input id="cidade" type="text" name="cidade" placeholder="Digite o nome da sua cidade" style="margin-bottom: 20px;" required><br>

        <label for="telefone">Telefone</label>
        <input id="ddd" type="number" name="ddd" style="width: 40px;" placeholder="(  )" required> 
        <input id="telefone" type="number" name="telefone" style="margin-bottom: 20px;"  placeholder="Digite seu telefone" required><br>

        <label for="usuario">Usuario</label>
        <input id="usuario" type="text" name="usuario" placeholder="Entre com o seu login" style="margin-bottom: 20px;" required><br>

        <label for="senha">Senha</label>
        <input id="senha" type="password" name="senha" placeholder="Digite sua senha" style="margin-bottom: 20px;" required><br>

        <input type="submit" value="Finalizar minha inscriçao">

   </form>

</body>
